<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4d1126" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DH KM 助理" />
    <title>DH KM 助理 - 每日最新二十条大事件资讯</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="app-header">
        <div class="brand-block">
          <div class="brand-mark">
            <img src="./icon.svg" alt="DH KM 助理图标" />
          </div>
          <div class="brand-copy">
            <p class="eyebrow">DH KM 助理</p>
            <h1>每日最新二十条大事件资讯</h1>
          </div>
        </div>
        <div class="live-pill" id="live-pill">实时更新</div>
      </header>

      <section class="control-panel">
        <div class="hero-meta">
          <div class="meta-item">
            <span class="meta-label">更新时间</span>
            <strong id="updated-at">加载中</strong>
          </div>
          <div class="meta-item">
            <span class="meta-label">当前条数</span>
            <strong id="item-count">0</strong>
          </div>
          <div class="meta-item">
            <span class="meta-label">当前分栏</span>
            <strong id="current-view-label">全部大事件</strong>
          </div>
        </div>

        <div class="toolbar-row">
          <div class="filter-tabs">
            <button class="filter-tab is-active" data-view="all" type="button">全部大事件</button>
            <button class="filter-tab" data-view="industry" type="button">平台新规</button>
          </div>
          <button id="refresh-button" class="refresh-button" type="button">刷新</button>
        </div>

        <label class="search-shell" for="search-input">
          <span class="search-label">搜索</span>
          <input
            id="search-input"
            class="search-input"
            type="search"
            placeholder="搜索事件、公司、版权、平台规则"
            autocomplete="off"
          />
        </label>
      </section>

      <section id="status-banner" class="status-banner loading" aria-live="polite">
        正在获取当天最新内容。
      </section>

      <section id="featured-card" class="featured-card" hidden>
        <p id="featured-tag" class="featured-tag">头条</p>
        <h2 id="featured-title" class="featured-title"></h2>
        <p id="featured-summary" class="featured-summary"></p>
      </section>

      <ol id="news-list" class="news-list"></ol>
    </main>

    <template id="item-template">
      <li class="news-item">
        <h2 class="item-title"></h2>
        <p class="item-summary"></p>
      </li>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
