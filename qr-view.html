<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DH KM 助理 - 手机扫码</title>
    <style>
      :root {
        --bg: #3b0b1c;
        --panel: rgba(255, 247, 243, 0.97);
        --text: #241418;
        --muted: #7a5963;
        --accent: #922843;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(255, 220, 205, 0.15), transparent 26%),
          linear-gradient(180deg, #5a1027 0%, #3b0b1c 52%, #22040f 100%);
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        color: var(--text);
      }

      .panel {
        width: min(92vw, 760px);
        padding: 24px;
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 30px 80px rgba(10, 3, 6, 0.3);
        text-align: center;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: clamp(30px, 5vw, 46px);
        line-height: 1.18;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .qr-shell {
        margin: 20px auto 0;
        width: min(78vw, 520px);
        padding: 18px;
        border-radius: 24px;
        background: #f8e9e2;
      }

      .qr-shell img {
        display: block;
        width: 100%;
        height: auto;
      }

      .hint {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">DH KM 助理</p>
      <h1>手机直接扫码</h1>
      <p class="sub">打开手机相机，直接扫下面这个码。</p>
      <section class="qr-shell">
        <img id="qr-image" src="./mobile-qr-direct.png" alt="手机扫码二维码" />
      </section>
      <p class="hint">如果还是扫不进去，先确认手机和电脑在同一个 Wi‑Fi。</p>
    </main>
    <script>
      const qrImage = document.querySelector("#qr-image");
      qrImage.src = `./mobile-qr-direct.png?t=${Date.now()}`;
    </script>
  </body>
</html>
